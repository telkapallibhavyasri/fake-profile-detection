<html>

<head>
<title>Fake Profile Detection</title>

<style>
body {
    background-image: url('https://images.unsplash.com/photo-1508780709619-79562169bc64');
    background-size: cover;
    background-position: center;
    font-family: Arial;
    color: white;
    text-align: center;
}

.container {
    background: rgba(0, 0, 0, 0.6);
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    margin: auto;
    margin-top: 100px;
}

input[type="text"] {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

input[type="submit"] {
    padding: 10px 20px;
    background-color: #00bcd4;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>Fake Profile Detection Using ANN</h1>

<form method="post">
{% csrf_token %}

<input type="text" name="t1" placeholder="Enter Username">

<br>

<input type="submit" value="Check Profile">

</form>

<br>

{% if result %}
<h2>{{ result }}</h2>
{% endif %}

{% if probability %}
<h3>Fake Profile Probability: {{ probability }} %</h3>
{% endif %}

</div>

</body>

</html>
